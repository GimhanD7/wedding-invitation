    <!-- Google Fonts for Elegant Wedding Invitation -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'leo-purple': {
                50: '#f3f4ff',
                100: '#e8eaff',
                200: '#d4d8ff',
                300: '#b5bbff',
                400: '#9196ff',
                500: '#6b70ff',
                600: '#5b47ff',
                700: '#4c38e8',
                800: '#3e2fba',
                900: '#352a93'
              },
              'leo-pink': {
                50: '#fef7ff',
                100: '#fceeff',
                200: '#f8ddff',
                300: '#f2c2ff',
                400: '#e998ff',
                500: '#dd6eff',
                600: '#c845f0',
                700: '#a82dd1',
                800: '#8b25aa',
                900: '#722189'
              }
            },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              cursive: ['Alex Brush', 'cursive'],
              greatvibes: ['Great Vibes', 'cursive'],
              cinzel: ['Cinzel Decorative', 'serif'],
              pinyon: ['Pinyon Script', 'cursive']
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'slide-up': 'slideUp 0.6s ease-out forwards',
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'gold-glow': 'goldGlow 2s ease-in-out infinite alternate',
              'spin-slow': 'spin 12s linear infinite'
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                '50%': { transform: 'translateY(-15px) rotate(3deg)' }
              },
              goldGlow: {
                '0%': { textShadow: '0 0 4px rgba(250, 204, 21, 0.2), 0 0 8px rgba(250, 204, 21, 0.1)' },
                '100%': { textShadow: '0 0 12px rgba(250, 204, 21, 0.6), 0 0 20px rgba(250, 204, 21, 0.4), 0 0 28px rgba(250, 204, 21, 0.2)' }
              }
            }
          }
        }
      }
    </script>
    <title>Niwarthana & Thenuka - Our Wedding Invitation</title>
